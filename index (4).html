<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="GvyTGbIx3Zov0CXr0f1voJ2LJnac-ppCl62NStzdY3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ManzChat - Live Chat & Shorts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for chat */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        
        /* Safe area padding for mobile devices */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
            .pt-safe { padding-top: max(0.75rem, env(safe-area-inset-top)); }
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        
        /* Video Feed Snap */
        .snap-y-mandatory { scroll-snap-type: y mandatory; }
        .snap-start { scroll-snap-align: start; }
        
        /* Chat Bubble Styles */
        .chat-bubble-me { border-bottom-right-radius: 4px; }
        .chat-bubble-other { border-bottom-left-radius: 4px; }
    </style>
</head>
<body class="flex items-center justify-center fixed inset-0 bg-gray-100 md:bg-gradient-to-br md:from-indigo-100 md:via-purple-100 md:to-pink-100 text-gray-800 font-sans md:p-4 overflow-hidden">
    
    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-white/90 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="flex flex-col items-center animate-slide-up">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mb-4 shadow-lg"></div>
            <p class="text-indigo-600 font-bold tracking-wide">Loading ManzChat...</p>
        </div>
    </div>

    <!-- Container -->
    <div class="w-full h-full md:h-[800px] md:max-w-6xl bg-white md:rounded-3xl shadow-none md:shadow-2xl overflow-hidden flex border-none md:border md:border-white/50 relative animate-fade-in">
        
        <!-- Join Screen -->
        <div id="join-screen" class="hidden flex-col items-center justify-center w-full h-full p-6 sm:p-8 text-center bg-white absolute inset-0 z-40">
            <div class="w-24 h-24 sm:w-28 sm:h-28 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-full flex items-center justify-center mb-6 shadow-xl animate-slide-up">
                <svg class="w-12 h-12 sm:w-14 sm:h-14 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            </div>
            <h2 class="text-4xl sm:text-5xl font-extrabold mb-3 text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 animate-slide-up" style="animation-delay: 0.1s">ManzChat</h2>
            <p class="text-gray-500 mb-10 text-base sm:text-lg max-w-sm mx-auto animate-slide-up" style="animation-delay: 0.2s">Connect with friends, join public rooms, and explore short videos.</p>
            
            <div class="w-full max-w-sm space-y-4 text-left animate-slide-up" style="animation-delay: 0.3s">
                <button id="google-login-btn" class="w-full bg-white border-2 border-gray-200 hover:border-indigo-100 hover:bg-indigo-50 active:scale-95 text-gray-700 font-bold py-3.5 px-4 rounded-2xl transition-all duration-200 shadow-sm flex items-center justify-center gap-3">
                    <svg class="w-6 h-6" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
            </div>
        </div>

        <!-- Main Dashboard & Chat Screen -->
        <div id="main-screen" class="hidden w-full h-full flex-col md:flex-row relative bg-white">
            
            <!-- Sidebar -->
            <div id="sidebar" class="w-full md:w-[320px] lg:w-[380px] bg-gray-50/80 backdrop-blur-md md:border-r border-gray-200 flex flex-col h-full absolute md:relative z-20 transition-transform duration-300 shadow-lg md:shadow-none">
                <!-- Branding -->
                <div class="p-5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white flex justify-between items-center shadow-md z-10 pt-safe shrink-0">
                    <h1 class="text-2xl font-extrabold tracking-tight flex items-center gap-2">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                        ManzChat
                    </h1>
                    <button id="leave-btn" class="bg-white/20 hover:bg-white/30 rounded-full transition p-2 backdrop-blur-sm" title="Sign Out">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>

                <!-- User Profile -->
                <div class="p-4 bg-white border-b border-gray-100 flex items-center justify-between shadow-sm relative z-10 shrink-0">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="relative">
                            <img id="my-avatar" src="" class="w-12 h-12 rounded-full object-cover border-2 border-indigo-100 shadow-sm flex-shrink-0">
                            <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
                        </div>
                        <div class="flex flex-col truncate">
                            <span id="my-username" class="font-bold text-gray-800 truncate text-base"></span>
                            <span id="my-status" class="text-xs text-green-500 font-semibold">Online</span>
                        </div>
                    </div>
                    <button id="open-edit-modal-btn" class="text-gray-400 hover:text-indigo-600 transition p-2.5 bg-gray-50 hover:bg-indigo-50 rounded-full flex-shrink-0 border border-gray-100 shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                    </button>
                </div>

                <!-- Tabs -->
                <div class="flex bg-white border-b border-gray-200 shadow-sm relative z-10 shrink-0">
                    <button id="tab-private" class="flex-1 py-3.5 text-sm font-bold text-indigo-600 border-b-[3px] border-indigo-600 transition flex items-center justify-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                        Private
                    </button>
                    <button id="tab-public" class="flex-1 py-3.5 text-sm font-bold text-gray-500 border-b-[3px] border-transparent hover:text-indigo-500 hover:bg-gray-50 transition flex items-center justify-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        Public
                    </button>
                    <button id="tab-videos" class="flex-1 py-3.5 text-sm font-bold text-gray-500 border-b-[3px] border-transparent hover:text-indigo-500 hover:bg-gray-50 transition flex items-center justify-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        Shorts
                    </button>
                </div>

                <!-- Tab Content: Private Chats -->
                <div id="panel-private" class="flex-1 flex flex-col min-h-0 overflow-hidden bg-white">
                    <div class="p-3 border-b border-gray-100 bg-gray-50/50 shrink-0">
                        <div class="flex gap-2 relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                            </div>
                            <input id="friend-username-input" type="text" placeholder="Add friend by username..." class="flex-1 pl-9 pr-3 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm transition">
                            <button id="add-friend-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition shadow-sm active:scale-95">Add</button>
                        </div>
                    </div>
                    <div class="flex-1 min-h-0 overflow-y-auto p-2 pb-safe md:pb-2">
                        <div id="friends-list" class="space-y-1"></div>
                    </div>
                </div>

            </div>
            
            <!-- Chat / Video Area -->
            <!-- Added overflow-hidden to constrain children to container height so input-area doesn't disappear -->
            <div id="main-content-area" class="hidden md:flex flex-1 flex-col bg-gray-50 h-full overflow-hidden absolute md:relative inset-0 md:inset-auto z-30 md:z-10 animate-fade-in w-full">
                
                <!-- Chat Header -->
                <div id="chat-header" class="bg-white px-4 py-3 md:px-6 md:py-4 flex items-center justify-between shadow-sm border-b border-gray-200 z-20 hidden pt-safe shrink-0">
                    <div class="flex items-center gap-3 md:gap-4">
                        <button id="back-to-sidebar-btn" class="md:hidden p-2 -ml-2 text-gray-500 hover:text-indigo-600 transition rounded-full hover:bg-gray-100 active:bg-gray-200">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <div class="relative">
                            <img id="chat-avatar" src="" class="w-10 h-10 md:w-12 md:h-12 rounded-full object-cover shadow-sm border border-gray-100">
                        </div>
                        <div class="flex flex-col">
                            <h2 id="chat-username" class="font-bold text-gray-800 text-base md:text-lg leading-tight"></h2>
                            <p id="chat-status" class="text-xs text-gray-500 font-medium mt-0.5"></p>
                        </div>
                    </div>
                    <!-- Call Buttons -->
                    <div id="call-buttons" class="flex gap-2 text-indigo-600">
                        <button class="p-2.5 bg-indigo-50 rounded-full hover:bg-indigo-100 transition active:scale-95" onclick="openCallModal('voice')">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        </button>
                        <button class="p-2.5 bg-indigo-50 rounded-full hover:bg-indigo-100 transition active:scale-95" onclick="openCallModal('video')">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- Empty State -->
                <div id="no-chat-header" class="absolute inset-0 flex-col items-center justify-center bg-gray-50/80 z-40 hidden animate-fade-in">
                    <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center mb-6 shadow-md text-indigo-300">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-700 mb-2">Welcome to ManzChat</h2>
                    <p class="text-gray-500 text-center max-w-xs">Select a friend to start chatting or explore public rooms and videos.</p>
                </div>
                
                <!-- Messages Area -->
                <!-- Added min-h-0 to prevent flex item from growing beyond its container -->
                <div id="messages" class="flex-1 min-h-0 overflow-y-auto p-4 md:p-6 space-y-5 bg-[#E5DDD5] hidden relative z-10" style="background-image: url('https://www.transparenttextures.com/patterns/cubes.png');"></div>
                
                <!-- Input Area -->
                <!-- Added shrink-0 to prevent the input area from being squished or hidden -->
                <div id="input-area" class="bg-white p-3 md:p-4 border-t border-gray-200 flex items-center gap-2 md:gap-3 pb-safe z-20 hidden shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] shrink-0">
                    <button class="p-2 text-gray-400 hover:text-indigo-600 transition rounded-full hover:bg-gray-100 flex-shrink-0" title="Add attachment">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                    </button>
                    <div class="flex-1 relative flex items-center">
                        <button class="absolute left-3 p-1.5 text-gray-400 hover:text-indigo-600 transition rounded-full hover:bg-gray-200 z-10" title="Add emoji">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </button>
                        <input id="message-input" type="text" class="w-full pl-11 pr-4 py-3 bg-gray-100 border border-transparent rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white text-gray-800 text-sm md:text-base transition shadow-sm" placeholder="Type a message...">
                    </div>
                    <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-full w-12 h-12 flex items-center justify-center transition duration-200 shadow-md flex-shrink-0 active:scale-95 group">
                        <svg class="w-5 h-5 transform group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>

                <!-- Video Feed Area -->
                <div id="video-feed-area" class="hidden flex-1 min-h-0 flex-col bg-black overflow-y-auto snap-y snap-mandatory relative h-full w-full z-20">
                    <div class="absolute top-4 left-4 z-50 md:hidden">
                        <button id="back-to-sidebar-btn-video" class="p-2 text-white bg-black/40 hover:bg-black/60 transition rounded-full backdrop-blur-md">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                    </div>
                    <button onclick="document.getElementById('upload-video-modal').classList.remove('hidden')" class="absolute top-4 right-4 bg-white/20 hover:bg-white/40 p-2.5 px-5 rounded-full text-white backdrop-blur-md z-50 transition shadow-lg text-sm font-bold flex items-center gap-2 border border-white/30">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg> Upload
                    </button>
                    <div id="videos-container" class="h-full w-full flex-1"></div>
                </div>

            </div>
        </div>
    </div>

    <!-- Modals -->
    <!-- Edit Profile Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
        <div class="bg-white rounded-3xl p-6 md:p-8 w-full max-w-sm shadow-2xl animate-slide-up">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Edit Profile</h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Username</label>
                    <input id="edit-username" type="text" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition font-medium">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Profile Picture</label>
                    <input id="edit-avatar" type="file" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer transition">
                </div>
                <div class="flex justify-end gap-3 mt-8">
                    <button id="close-modal-btn" class="px-5 py-2.5 text-gray-600 font-bold hover:bg-gray-100 rounded-xl transition">Cancel</button>
                    <button id="save-profile-btn" class="px-5 py-2.5 bg-indigo-600 font-bold text-white rounded-xl hover:bg-indigo-700 shadow-md transition flex items-center justify-center min-w-[100px] active:scale-95">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Call Modal -->
    <div id="call-modal" class="hidden fixed inset-0 bg-gray-900/95 backdrop-blur-md flex flex-col items-center justify-center z-[60] animate-fade-in">
        <div class="relative mb-8">
            <img id="call-avatar" src="" class="w-32 h-32 rounded-full border-4 border-indigo-500 shadow-[0_0_30px_rgba(99,102,241,0.6)] animate-pulse object-cover">
            <div class="absolute inset-0 rounded-full border-4 border-indigo-400 animate-ping opacity-75"></div>
        </div>
        <h2 id="call-name" class="text-3xl font-extrabold text-white mb-2"></h2>
        <p class="text-indigo-300 mb-12 font-medium tracking-wide" id="call-status-text">Calling...</p>
        <div class="flex gap-6">
            <button onclick="document.getElementById('call-modal').classList.add('hidden')" class="bg-red-500 hover:bg-red-600 text-white p-5 rounded-full shadow-lg transition transform hover:scale-110 active:scale-95">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l-2-2m2 2l2 2M5 11l2 2m-2-2l-2-2m2 2l2-2m-2 2l-2 2"></path></svg>
            </button>
        </div>
    </div>

    <!-- Upload Video Modal -->
    <div id="upload-video-modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-slide-up">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Upload Short</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Video File</label>
                    <input type="file" accept="video/*" id="video-file-input" class="w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:bg-indigo-50 file:text-indigo-700 file:font-bold hover:file:bg-indigo-100 cursor-pointer transition">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Caption</label>
                    <input type="text" id="video-caption-input" placeholder="Write a catchy caption..." class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition font-medium">
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="document.getElementById('upload-video-modal').classList.add('hidden')" class="px-5 py-2.5 text-gray-600 font-bold hover:bg-gray-100 rounded-xl transition">Cancel</button>
                <button id="submit-video-btn" class="px-5 py-2.5 bg-indigo-600 font-bold text-white rounded-xl hover:bg-indigo-700 shadow-md transition active:scale-95">Upload</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, getDoc, updateDoc, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDG3Etn46FE_79QQZuFnUJpY_fExfagSJc",
            authDomain: "webchatmanzcode.firebaseapp.com",
            projectId: "webchatmanzcode",
            storageBucket: "webchatmanzcode.firebasestorage.app",
            messagingSenderId: "449247016674",
            appId: "1:449247016674:web:fb7a3d2710dc2c7f0c50bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        let currentUserDoc = null;
        let currentMode = 'private'; // private, public, videos
        let currentChatFriend = null;
        let messagesUnsubscribe = null;
        let friendsUnsubscribe = null;
        let publicUnsubscribe = null;
        let videosUnsubscribe = null;

        // Elements
        const loadingScreen = document.getElementById('loading-screen');
        const joinScreen = document.getElementById('join-screen');
        const mainScreen = document.getElementById('main-screen');
        const chatHeader = document.getElementById('chat-header');
        const noChatHeader = document.getElementById('no-chat-header');
        const messagesDiv = document.getElementById('messages');
        const inputArea = document.getElementById('input-area');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const friendsList = document.getElementById('friends-list');
        const videoFeedArea = document.getElementById('video-feed-area');
        const videosContainer = document.getElementById('videos-container');
        const panelPrivate = document.getElementById('panel-private');
        const sidebar = document.getElementById('sidebar');
        const mainContentArea = document.getElementById('main-content-area');
        
        // Presence Management
        async function setOnlineStatus(isOnline) {
            if(currentUserDoc) {
                await updateDoc(doc(db, "users", currentUserDoc.uid), {
                    isOnline: isOnline,
                    lastSeen: serverTimestamp()
                });
            }
        }
        window.addEventListener('beforeunload', () => setOnlineStatus(false));

        // Auth
        onAuthStateChanged(auth, async (user) => {
            loadingScreen.classList.add('hidden');
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    const generatedUsername = (user.displayName || 'User').replace(/\s+/g, '') + Math.floor(Math.random() * 1000);
                    currentUserDoc = { uid: user.uid, username: generatedUsername, avatar: user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`, isOnline: true };
                    await setDoc(userRef, currentUserDoc);
                } else {
                    currentUserDoc = userSnap.data();
                    await setOnlineStatus(true);
                }
                
                document.getElementById('my-avatar').src = currentUserDoc.avatar;
                document.getElementById('my-username').innerText = currentUserDoc.username;
                document.getElementById('edit-username').value = currentUserDoc.username;
                
                joinScreen.classList.add('hidden');
                mainScreen.classList.remove('hidden');
                mainScreen.classList.add('flex');
                
                loadFriends();
                switchTab('private');
            } else {
                if(currentUserDoc) setOnlineStatus(false);
                joinScreen.classList.remove('hidden');
                joinScreen.classList.add('flex');
                mainScreen.classList.add('hidden');
                mainScreen.classList.remove('flex');
                currentUserDoc = null;
            }
        });

        document.getElementById('google-login-btn').addEventListener('click', () => signInWithPopup(auth, provider));
        document.getElementById('leave-btn').addEventListener('click', () => signOut(auth));

        // Tabs Logic
        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tab-private').classList.remove('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
            document.getElementById('tab-public').classList.remove('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
            document.getElementById('tab-videos').classList.remove('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
            
            document.getElementById(`tab-${mode}`).classList.add('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
            
            // Reset views
            chatHeader.classList.add('hidden');
            noChatHeader.classList.add('hidden');
            noChatHeader.classList.remove('flex');
            messagesDiv.classList.add('hidden');
            inputArea.classList.add('hidden');
            videoFeedArea.classList.add('hidden');
            panelPrivate.classList.add('hidden');

            if(messagesUnsubscribe) messagesUnsubscribe();
            if(publicUnsubscribe) publicUnsubscribe();
            
            if (mode === 'private') {
                panelPrivate.classList.remove('hidden');
                panelPrivate.classList.add('flex');
                
                if (window.innerWidth < 768) {
                    sidebar.classList.remove('hidden');
                    mainContentArea.classList.add('hidden');
                    mainContentArea.classList.remove('flex');
                } else {
                    noChatHeader.classList.remove('hidden');
                    noChatHeader.classList.add('flex');
                }
            } else if (mode === 'public') {
                if (window.innerWidth < 768) {
                    sidebar.classList.add('hidden');
                    mainContentArea.classList.remove('hidden');
                    mainContentArea.classList.add('flex');
                }
                openPublicChat();
            } else if (mode === 'videos') {
                if (window.innerWidth < 768) {
                    sidebar.classList.add('hidden');
                    mainContentArea.classList.remove('hidden');
                    mainContentArea.classList.add('flex');
                }
                openVideoFeed();
            }
        }

        document.getElementById('tab-private').addEventListener('click', () => switchTab('private'));
        document.getElementById('tab-public').addEventListener('click', () => switchTab('public'));
        document.getElementById('tab-videos').addEventListener('click', () => switchTab('videos'));
        
        function handleBackToSidebar() {
            sidebar.classList.remove('hidden');
            mainContentArea.classList.add('hidden');
            mainContentArea.classList.remove('flex');
            if (currentMode !== 'private') {
                switchTab('private');
            }
        }

        document.getElementById('back-to-sidebar-btn').addEventListener('click', handleBackToSidebar);
        document.getElementById('back-to-sidebar-btn-video').addEventListener('click', handleBackToSidebar);

        // Load Friends & Last Message
        function loadFriends() {
            const q = query(collection(db, "users", currentUserDoc.uid, "friends"));
            friendsUnsubscribe = onSnapshot(q, (snapshot) => {
                friendsList.innerHTML = '';
                if(snapshot.empty) {
                    friendsList.innerHTML = `<div class="p-6 text-center text-gray-400 text-sm font-medium">No friends yet. Add someone!</div>`;
                }
                snapshot.forEach((docSnap) => {
                    const friend = docSnap.data();
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-3 p-3 hover:bg-white rounded-xl cursor-pointer transition border border-transparent hover:border-gray-200 hover:shadow-sm mb-1";
                    div.innerHTML = `
                        <div class="relative">
                            <img src="${friend.avatar}" class="w-12 h-12 rounded-full object-cover shadow-sm border border-gray-100">
                        </div>
                        <div class="flex flex-col flex-1 truncate">
                            <span class="font-bold text-gray-800 text-sm truncate">${friend.username}</span>
                            <span class="text-xs text-gray-500 truncate mt-0.5" id="last-msg-${friend.uid}">Tap to chat...</span>
                        </div>
                    `;
                    div.onclick = () => openPrivateChat(friend);
                    friendsList.appendChild(div);

                    // Fetch last message
                    const chatId = currentUserDoc.uid < friend.uid ? `${currentUserDoc.uid}_${friend.uid}` : `${friend.uid}_${currentUserDoc.uid}`;
                    const msgQ = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "desc"), limit(1));
                    onSnapshot(msgQ, (msgSnap) => {
                        if(!msgSnap.empty) {
                            const msgData = msgSnap.docs[0].data();
                            const msgEl = document.getElementById(`last-msg-${friend.uid}`);
                            if(msgEl) {
                                const prefix = msgData.senderId === currentUserDoc.uid ? 'You: ' : '';
                                msgEl.innerText = prefix + msgData.text;
                                msgEl.classList.replace('text-gray-500', 'text-gray-600');
                            }
                        }
                    });
                });
            });
        }

        // Add Friend
        document.getElementById('add-friend-btn').addEventListener('click', async () => {
            const username = document.getElementById('friend-username-input').value.trim();
            if(!username || username === currentUserDoc.username) return;
            
            const btn = document.getElementById('add-friend-btn');
            btn.disabled = true;
            btn.innerText = '...';

            const q = query(collection(db, "users"), where("username", "==", username));
            const snap = await getDocs(q);
            if(!snap.empty) {
                const friendDoc = snap.docs[0].data();
                await setDoc(doc(db, "users", currentUserDoc.uid, "friends", friendDoc.uid), { uid: friendDoc.uid, username: friendDoc.username, avatar: friendDoc.avatar });
                await setDoc(doc(db, "users", friendDoc.uid, "friends", currentUserDoc.uid), { uid: currentUserDoc.uid, username: currentUserDoc.username, avatar: currentUserDoc.avatar });
                document.getElementById('friend-username-input').value = '';
                alert("Friend added successfully!");
            } else { 
                alert("User not found!"); 
            }
            btn.disabled = false;
            btn.innerText = 'Add';
        });

        // Time formatter
        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return "Just now";
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            return `${Math.floor(hours / 24)}d ago`;
        }

        // Open Private Chat
        window.openPrivateChat = function(friend) {
            currentMode = 'private';
            currentChatFriend = friend;
            
            if (window.innerWidth < 768) {
                sidebar.classList.add('hidden');
                mainContentArea.classList.remove('hidden');
                mainContentArea.classList.add('flex');
            }

            noChatHeader.classList.add('hidden');
            noChatHeader.classList.remove('flex');
            chatHeader.classList.remove('hidden');
            messagesDiv.classList.remove('hidden');
            inputArea.classList.remove('hidden');
            videoFeedArea.classList.add('hidden');
            document.getElementById('call-buttons').classList.remove('hidden');
            
            document.getElementById('chat-avatar').src = friend.avatar;
            document.getElementById('chat-username').innerText = friend.username;
            
            // Listen to friend's presence
            onSnapshot(doc(db, "users", friend.uid), (docSnap) => {
                if(docSnap.exists()) {
                    const data = docSnap.data();
                    const statusEl = document.getElementById('chat-status');
                    if(data.isOnline) {
                        statusEl.innerText = 'Online';
                        statusEl.classList.replace('text-gray-500', 'text-green-500');
                    } else {
                        const last = data.lastSeen ? data.lastSeen.toDate() : new Date();
                        statusEl.innerText = 'Last seen ' + timeAgo(last);
                        statusEl.classList.replace('text-green-500', 'text-gray-500');
                    }
                }
            });

            if(messagesUnsubscribe) messagesUnsubscribe();
            const chatId = currentUserDoc.uid < friend.uid ? `${currentUserDoc.uid}_${friend.uid}` : `${friend.uid}_${currentUserDoc.uid}`;
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                snapshot.forEach((docSnap) => displayMessage(docSnap.data()));
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        };

        // Open Public Chat
        function openPublicChat() {
            noChatHeader.classList.add('hidden');
            noChatHeader.classList.remove('flex');
            chatHeader.classList.remove('hidden');
            messagesDiv.classList.remove('hidden');
            inputArea.classList.remove('hidden');
            videoFeedArea.classList.add('hidden');
            document.getElementById('call-buttons').classList.add('hidden');
            
            document.getElementById('chat-avatar').src = 'https://api.dicebear.com/7.x/shapes/svg?seed=public&backgroundColor=6366f1';
            document.getElementById('chat-username').innerText = 'Public Global Chat';
            document.getElementById('chat-status').innerText = 'Everyone is here';
            document.getElementById('chat-status').className = 'text-xs text-indigo-500 font-bold mt-0.5';

            if(publicUnsubscribe) publicUnsubscribe();
            const q = query(collection(db, "public_messages"), orderBy("timestamp", "asc"));
            publicUnsubscribe = onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                snapshot.forEach((docSnap) => displayMessage(docSnap.data()));
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }

        // Display Message
        function displayMessage(msg) {
            const isMe = msg.senderId === currentUserDoc.uid;
            const msgEl = document.createElement('div');
            msgEl.className = `flex w-full space-x-2 max-w-[85%] md:max-w-[75%] animate-slide-up ${isMe ? 'ml-auto justify-end space-x-reverse' : ''}`;
            
            const timeString = msg.timestamp ? msg.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
            
            msgEl.innerHTML = `
                ${!isMe && currentMode === 'public' ? `<img src="${msg.avatar}" class="h-8 w-8 rounded-full object-cover self-end mb-1 shadow-sm border border-gray-200">` : ''}
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    ${!isMe && currentMode === 'public' ? `<span class="text-[11px] text-gray-500 mb-1 px-1 font-bold">${msg.senderName}</span>` : ''}
                    <div class="px-4 py-2.5 text-[15px] leading-relaxed shadow-sm break-words max-w-full ${isMe ? 'bg-indigo-600 text-white chat-bubble-me rounded-2xl rounded-tr-sm' : 'bg-white border border-gray-100 text-gray-800 chat-bubble-other rounded-2xl rounded-tl-sm'}">
                        <span>${msg.text}</span>
                        <div class="text-[10px] text-right mt-1.5 ${isMe ? 'text-indigo-200' : 'text-gray-400'} font-medium flex justify-end items-center gap-1">
                            ${timeString}
                            ${isMe ? `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>` : ''}
                        </div>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(msgEl);
        }

        // Send Message
        sendBtn.addEventListener('click', async () => {
            const text = messageInput.value.trim();
            if(!text) return;
            messageInput.value = '';
            
            const msgData = {
                senderId: currentUserDoc.uid,
                senderName: currentUserDoc.username,
                avatar: currentUserDoc.avatar,
                text: text,
                timestamp: serverTimestamp()
            };

            if(currentMode === 'private' && currentChatFriend) {
                const chatId = currentUserDoc.uid < currentChatFriend.uid ? `${currentUserDoc.uid}_${currentChatFriend.uid}` : `${currentChatFriend.uid}_${currentUserDoc.uid}`;
                await addDoc(collection(db, "chats", chatId, "messages"), msgData);
            } else if(currentMode === 'public') {
                await addDoc(collection(db, "public_messages"), msgData);
            }
        });

        messageInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendBtn.click();
        });

        // Call Modal logic
        window.openCallModal = function(type) {
            document.getElementById('call-avatar').src = currentChatFriend.avatar;
            document.getElementById('call-name').innerText = currentChatFriend.username;
            document.getElementById('call-status-text').innerText = type === 'video' ? 'Starting Video Call...' : 'Ringing...';
            document.getElementById('call-modal').classList.remove('hidden');
        };

        // Video Feed Logic
        function openVideoFeed() {
            noChatHeader.classList.add('hidden');
            noChatHeader.classList.remove('flex');
            chatHeader.classList.add('hidden');
            messagesDiv.classList.add('hidden');
            inputArea.classList.add('hidden');
            
            videoFeedArea.classList.remove('hidden');
            videoFeedArea.classList.add('flex');
            
            const q = query(collection(db, "videos"), orderBy("timestamp", "desc"));
            if(videosUnsubscribe) videosUnsubscribe();
            videosUnsubscribe = onSnapshot(q, (snapshot) => {
                videosContainer.innerHTML = '';
                if(snapshot.empty) {
                    videosContainer.innerHTML = `<div class="text-white text-center flex flex-col items-center justify-center h-full">
                        <svg class="w-16 h-16 text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        <p class="font-bold text-xl">No shorts yet</p>
                        <p class="text-gray-400 mt-2">Be the first to upload!</p>
                    </div>`;
                }
                snapshot.forEach(docSnap => {
                    const video = docSnap.data();
                    const vId = docSnap.id;
                    const div = document.createElement('div');
                    div.className = "w-full h-full snap-start relative bg-black flex items-center justify-center";
                    div.innerHTML = `
                        <video src="${video.url}" loop class="w-full h-full object-contain md:object-cover" onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/60 pointer-events-none"></div>
                        <div class="absolute bottom-6 left-4 text-white z-10 w-3/4">
                            <h3 class="font-extrabold text-lg drop-shadow-lg flex items-center gap-2">
                                @${video.uploaderName}
                                ${video.uploaderId !== currentUserDoc.uid ? `<button onclick="addVideoFriend('${video.uploaderName}')" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-2 py-0.5 rounded-full font-bold shadow-md transition">Follow</button>` : ''}
                            </h3>
                            <p class="text-sm drop-shadow-md mt-1 font-medium">${video.caption}</p>
                        </div>
                        <div class="absolute right-4 bottom-24 flex flex-col gap-6 items-center z-10">
                            <div class="relative flex flex-col items-center">
                                <img src="${video.uploaderAvatar}" class="w-12 h-12 rounded-full border-2 border-white shadow-lg object-cover">
                            </div>
                            <button class="flex flex-col items-center text-white drop-shadow-md hover:scale-110 transition group" onclick="likeVideo('${vId}')">
                                <div class="p-3 bg-black/20 rounded-full backdrop-blur-sm group-hover:bg-black/40 transition">
                                    <svg class="w-7 h-7 ${video.likes && video.likes.includes(currentUserDoc.uid) ? 'text-red-500 fill-current' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                                </div>
                                <span class="text-xs mt-1.5 font-bold">${video.likes ? video.likes.length : 0}</span>
                            </button>
                        </div>
                    `;
                    videosContainer.appendChild(div);
                });
                // Auto play first video if exists
                const firstVid = videosContainer.querySelector('video');
                if(firstVid) firstVid.play().catch(()=>{});
            });
        }

        // Upload Video
        document.getElementById('submit-video-btn').addEventListener('click', async () => {
            const file = document.getElementById('video-file-input').files[0];
            const caption = document.getElementById('video-caption-input').value;
            if(!file) return alert("Select a video!");
            
            // Added file size limit check (max 50MB)
            if(file.size > 50 * 1024 * 1024) return alert("Video is too large! Maximum allowed size is 50MB.");
            
            const btn = document.getElementById('submit-video-btn');
            btn.innerText = "Uploading...";
            btn.disabled = true;
            
            try {
                // Ensure proper file extension is saved to Firebase Storage
                const fileExt = file.name.split('.').pop() || 'mp4';
                const storageRef = ref(storage, `videos/${currentUserDoc.uid}_${Date.now()}.${fileExt}`);
                
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);
                
                await addDoc(collection(db, "videos"), {
                    url: url,
                    caption: caption || "No caption",
                    uploaderId: currentUserDoc.uid,
                    uploaderName: currentUserDoc.username,
                    uploaderAvatar: currentUserDoc.avatar,
                    likes: [],
                    timestamp: serverTimestamp()
                });
                
                document.getElementById('upload-video-modal').classList.add('hidden');
                document.getElementById('video-file-input').value = '';
                document.getElementById('video-caption-input').value = '';
                alert("Short video uploaded successfully!");
            } catch(e) {
                console.error(e);
                alert("Upload failed. Please check your network and try again.");
            } finally {
                btn.innerText = "Upload";
                btn.disabled = false;
            }
        });

        // Like Video
        window.likeVideo = async function(videoId) {
            const videoRef = doc(db, "videos", videoId);
            const snap = await getDoc(videoRef);
            if(snap.exists()) {
                let likes = snap.data().likes || [];
                if(likes.includes(currentUserDoc.uid)) {
                    likes = likes.filter(id => id !== currentUserDoc.uid);
                } else {
                    likes.push(currentUserDoc.uid);
                }
                await updateDoc(videoRef, { likes: likes });
            }
        };

        // Add Uploader as Friend
        window.addVideoFriend = async function(username) {
            document.getElementById('friend-username-input').value = username;
            document.getElementById('add-friend-btn').click();
        };

        // Edit Profile Modals
        document.getElementById('open-edit-modal-btn').addEventListener('click', () => document.getElementById('edit-modal').classList.remove('hidden'));
        document.getElementById('close-modal-btn').addEventListener('click', () => document.getElementById('edit-modal').classList.add('hidden'));

    </script>
</body>
</html>
