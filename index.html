<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ManzChat - Live Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for chat */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        /* Safe area padding for mobile devices */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe {
                padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-white md:bg-gradient-to-br md:from-indigo-500 md:to-purple-600 text-gray-800 font-sans md:p-4 overflow-hidden">
    
    <!-- Loading Screen (Mencegah kedip saat cek login) -->
    <div id="loading-screen" class="fixed inset-0 bg-white flex items-center justify-center z-50">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mb-4"></div>
            <p class="text-indigo-600 font-medium">Loading...</p>
        </div>
    </div>

    <!-- Container -->
    <div class="w-full h-[100dvh] md:h-[700px] md:max-w-5xl bg-white md:rounded-2xl shadow-none md:shadow-2xl overflow-hidden flex border-none md:border md:border-white/20 relative">
        
        <!-- Join Screen -->
        <div id="join-screen" class="hidden flex-col items-center justify-center w-full h-full p-6 sm:p-8 text-center bg-white absolute inset-0 z-40">
            <div class="w-20 h-20 sm:w-24 sm:h-24 bg-indigo-100 rounded-full flex items-center justify-center mb-6 shadow-inner">
                <svg class="w-10 h-10 sm:w-12 sm:h-12 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            </div>
            <h2 class="text-3xl sm:text-4xl font-bold mb-2 text-indigo-600">ManzChat</h2>
            <p class="text-gray-500 mb-8 text-sm sm:text-base">Sign in to connect with your friends</p>
            
            <div class="w-full max-w-sm space-y-4 text-left">
                <button id="google-login-btn" class="w-full bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-3 px-4 rounded-xl transition duration-200 shadow-sm flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign in with Google
                </button>
            </div>
        </div>

        <!-- Main Dashboard & Chat Screen -->
        <div id="main-screen" class="hidden w-full h-full flex-col md:flex-row relative">
            
            <!-- Sidebar (Dashboard) -->
            <div id="sidebar" class="w-full md:w-1/3 bg-gray-50 md:border-r flex flex-col h-full absolute md:relative z-20 transition-transform duration-300">
                <!-- Branding -->
                <div class="p-4 bg-indigo-600 text-white flex justify-between items-center shadow-md z-10 pt-safe">
                    <h1 class="text-xl font-bold tracking-wide">ManzChat</h1>
                    <button id="leave-btn" class="text-indigo-200 hover:text-white transition p-1" title="Sign Out">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>

                <!-- User Profile -->
                <div class="p-4 bg-white border-b flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <img id="my-avatar" src="" class="w-12 h-12 rounded-full object-cover border-2 border-indigo-100 flex-shrink-0">
                        <div class="flex flex-col truncate">
                            <span id="my-username" class="font-bold text-gray-800 truncate text-sm sm:text-base"></span>
                            <span class="text-xs text-green-500 font-medium">Online</span>
                        </div>
                    </div>
                    <button id="open-edit-modal-btn" class="text-gray-400 hover:text-indigo-600 transition p-2 bg-gray-100 rounded-full flex-shrink-0" title="Edit Profile">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>
                </div>

                <!-- Add Friend -->
                <div class="p-4 border-b bg-gray-50">
                    <h3 class="text-xs font-bold text-gray-500 uppercase mb-2">Add Friend</h3>
                    <div class="flex gap-2">
                        <input id="friend-username-input" type="text" placeholder="Enter username..." class="flex-1 px-3 py-2 bg-white border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <button id="add-friend-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm">Add</button>
                    </div>
                </div>

                <!-- Friends List -->
                <div class="flex-1 overflow-y-auto p-2 pb-safe md:pb-2">
                    <h3 class="text-xs font-bold text-gray-500 uppercase mb-2 px-2 mt-2">Private Chats</h3>
                    <div id="friends-list" class="space-y-1">
                        <!-- Friend items injected here -->
                    </div>
                </div>
            </div>
            
            <!-- Chat Area -->
            <div id="chat-area" class="hidden md:flex w-full md:w-2/3 flex-col bg-white h-full absolute md:relative inset-0 md:inset-auto z-30 md:z-10">
                <!-- Chat Header (Active) -->
                <div id="chat-header" class="bg-white px-4 py-3 md:px-6 md:py-4 flex items-center justify-between shadow-sm border-b z-10 hidden pt-safe">
                    <div class="flex items-center gap-3 md:gap-4">
                        <button id="back-to-sidebar-btn" class="md:hidden p-2 -ml-2 text-gray-500 hover:text-indigo-600 transition rounded-full hover:bg-gray-100">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <img id="chat-avatar" src="" class="w-10 h-10 rounded-full object-cover shadow-sm">
                        <div>
                            <h2 id="chat-username" class="font-bold text-gray-800 text-base md:text-lg"></h2>
                            <p class="text-xs text-indigo-500 font-medium">Private Chat</p>
                        </div>
                    </div>
                </div>

                <!-- Chat Header (Empty State) -->
                <div id="no-chat-header" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-50 z-20 hidden md:flex">
                    <div class="w-20 h-20 bg-gray-200 rounded-full flex items-center justify-center mb-4 text-gray-400">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    </div>
                    <h2 class="text-xl font-bold text-gray-400">Select a friend to chat</h2>
                </div>
                
                <!-- Messages Area -->
                <div id="messages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-gray-50/50">
                    <!-- Messages will be dynamically injected here -->
                </div>
                
                <!-- Input Area -->
                <div class="bg-white p-3 md:p-4 border-t flex items-center gap-2 md:gap-3 pb-safe z-10">
                    <input id="message-input" type="text" class="flex-1 px-4 py-3 bg-gray-100 rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-800 text-sm disabled:opacity-50" placeholder="Type a message..." disabled>
                    <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-full p-3 flex items-center justify-center transition duration-200 shadow-md disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0" disabled>
                        <svg class="w-5 h-5 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Edit Profile Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity">
        <div class="bg-white rounded-2xl p-6 md:p-8 w-full max-w-sm shadow-2xl transform transition-transform scale-100">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Edit Profile</h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <input id="edit-username" type="text" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Profile Picture</label>
                    <input id="edit-avatar" type="file" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                </div>
                <div class="flex justify-end gap-3 mt-8">
                    <button id="close-modal-btn" class="px-5 py-2.5 text-gray-600 font-medium hover:bg-gray-100 rounded-xl transition">Cancel</button>
                    <button id="save-profile-btn" class="px-5 py-2.5 bg-indigo-600 font-medium text-white rounded-xl hover:bg-indigo-700 shadow-md transition flex items-center justify-center min-w-[100px]">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, getDoc, updateDoc, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDG3Etn46FE_79QQZuFnUJpY_fExfagSJc",
            authDomain: "webchatmanzcode.firebaseapp.com",
            projectId: "webchatmanzcode",
            storageBucket: "webchatmanzcode.firebasestorage.app",
            messagingSenderId: "449247016674",
            appId: "1:449247016674:web:fb7a3d2710dc2c7f0c50bb",
            measurementId: "G-PSL7NY1L6V"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        // App State
        let currentUserDoc = null;
        let currentChatFriend = null;
        let messagesUnsubscribe = null;
        let friendsUnsubscribe = null;
        let isAuthResolved = false;

        // DOM Elements
        const loadingScreen = document.getElementById('loading-screen');
        const joinScreen = document.getElementById('join-screen');
        const mainScreen = document.getElementById('main-screen');
        const sidebar = document.getElementById('sidebar');
        const chatArea = document.getElementById('chat-area');
        const backToSidebarBtn = document.getElementById('back-to-sidebar-btn');
        const googleLoginBtn = document.getElementById('google-login-btn');
        const leaveBtn = document.getElementById('leave-btn');
        
        const myAvatar = document.getElementById('my-avatar');
        const myUsername = document.getElementById('my-username');
        const openEditModalBtn = document.getElementById('open-edit-modal-btn');
        
        const friendUsernameInput = document.getElementById('friend-username-input');
        const addFriendBtn = document.getElementById('add-friend-btn');
        const friendsList = document.getElementById('friends-list');
        
        const chatHeader = document.getElementById('chat-header');
        const noChatHeader = document.getElementById('no-chat-header');
        const chatAvatar = document.getElementById('chat-avatar');
        const chatUsername = document.getElementById('chat-username');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        
        const editModal = document.getElementById('edit-modal');
        const editUsernameInput = document.getElementById('edit-username');
        const editAvatarInput = document.getElementById('edit-avatar');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const saveProfileBtn = document.getElementById('save-profile-btn');

        // Authentication Observer
        onAuthStateChanged(auth, async (user) => {
            if (!isAuthResolved) {
                loadingScreen.classList.add('hidden');
                isAuthResolved = true;
            }

            if (user) {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    // Create new user profile
                    const generatedUsername = (user.displayName || 'User').replace(/\s+/g, '') + Math.floor(Math.random() * 1000);
                    currentUserDoc = {
                        uid: user.uid,
                        username: generatedUsername,
                        avatar: user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`
                    };
                    await setDoc(userRef, currentUserDoc);
                } else {
                    currentUserDoc = userSnap.data();
                }
                
                updateProfileUI();
                loadFriends();
                
                joinScreen.classList.add('hidden');
                joinScreen.classList.remove('flex');
                mainScreen.classList.remove('hidden');
                mainScreen.classList.add('flex');
                
                handleResponsiveLayout();
            } else {
                joinScreen.classList.remove('hidden');
                joinScreen.classList.add('flex');
                mainScreen.classList.add('hidden');
                mainScreen.classList.remove('flex');
                
                if(messagesUnsubscribe) messagesUnsubscribe();
                if(friendsUnsubscribe) friendsUnsubscribe();
                currentUserDoc = null;
                currentChatFriend = null;
                messagesDiv.innerHTML = '';
                noChatHeader.classList.remove('hidden');
                chatHeader.classList.add('hidden');
                messageInput.disabled = true;
                sendBtn.disabled = true;
                
                // Reset mobile view
                sidebar.classList.remove('hidden');
                sidebar.classList.add('flex');
                chatArea.classList.add('hidden', 'md:flex');
                chatArea.classList.remove('flex');
            }
        });

        // Login / Logout (Persist Login)
        googleLoginBtn.addEventListener('click', async () => {
            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login failed:", error);
            }
        });
        
        leaveBtn.addEventListener('click', () => signOut(auth));

        // Update Profile UI
        function updateProfileUI() {
            myAvatar.src = currentUserDoc.avatar;
            myUsername.innerText = currentUserDoc.username;
            editUsernameInput.value = currentUserDoc.username;
        }

        // Modal Controls
        openEditModalBtn.addEventListener('click', () => editModal.classList.remove('hidden'));
        closeModalBtn.addEventListener('click', () => {
            editModal.classList.add('hidden');
            editAvatarInput.value = '';
        });

        // Save Profile (Username & Avatar)
        saveProfileBtn.addEventListener('click', async () => {
            const newUsername = editUsernameInput.value.trim();
            const file = editAvatarInput.files[0];
            
            if (!newUsername) return alert("Username cannot be empty");
            
            saveProfileBtn.innerText = "Saving...";
            saveProfileBtn.disabled = true;
            
            try {
                // Check if username is taken
                if (newUsername !== currentUserDoc.username) {
                    const q = query(collection(db, "users"), where("username", "==", newUsername));
                    const snap = await getDocs(q);
                    if (!snap.empty) {
                        alert("Username already taken!");
                        return;
                    }
                }
                
                let newAvatarUrl = currentUserDoc.avatar;
                
                // Upload new avatar if selected
                if (file) {
                    const storageRef = ref(storage, `avatars/${currentUserDoc.uid}_${Date.now()}`);
                    await uploadBytes(storageRef, file);
                    newAvatarUrl = await getDownloadURL(storageRef);
                }
                
                // Update Firestore
                await updateDoc(doc(db, "users", currentUserDoc.uid), {
                    username: newUsername,
                    avatar: newAvatarUrl
                });
                
                currentUserDoc.username = newUsername;
                currentUserDoc.avatar = newAvatarUrl;
                
                updateProfileUI();
                editModal.classList.add('hidden');
                editAvatarInput.value = '';
            } catch(e) {
                console.error(e);
                alert("Error updating profile");
            } finally {
                saveProfileBtn.innerText = "Save";
                saveProfileBtn.disabled = false;
            }
        });

        // Add Friend
        addFriendBtn.addEventListener('click', async () => {
            const friendUsername = friendUsernameInput.value.trim();
            if (!friendUsername) return;
            if (friendUsername === currentUserDoc.username) return alert("You cannot add yourself!");
            
            addFriendBtn.disabled = true;
            addFriendBtn.innerText = "...";
            
            try {
                const q = query(collection(db, "users"), where("username", "==", friendUsername));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    alert("User not found!");
                } else {
                    const friendDoc = snap.docs[0].data();
                    
                    // Add to current user's friends list
                    await setDoc(doc(db, "users", currentUserDoc.uid, "friends", friendDoc.uid), {
                        uid: friendDoc.uid,
                        username: friendDoc.username,
                        avatar: friendDoc.avatar
                    });
                    
                    // Add to friend's friends list
                    await setDoc(doc(db, "users", friendDoc.uid, "friends", currentUserDoc.uid), {
                        uid: currentUserDoc.uid,
                        username: currentUserDoc.username,
                        avatar: currentUserDoc.avatar
                    });
                    
                    friendUsernameInput.value = '';
                }
            } catch (e) {
                console.error(e);
                alert("Error adding friend");
            } finally {
                addFriendBtn.disabled = false;
                addFriendBtn.innerText = "Add";
            }
        });

        // Load Friends List
        function loadFriends() {
            const q = query(collection(db, "users", currentUserDoc.uid, "friends"));
            friendsUnsubscribe = onSnapshot(q, (snapshot) => {
                friendsList.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const friend = docSnap.data();
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-3 p-3 hover:bg-indigo-50 rounded-xl cursor-pointer transition border border-transparent hover:border-indigo-100";
                    div.innerHTML = `
                        <img src="${friend.avatar}" class="w-10 h-10 rounded-full object-cover shadow-sm">
                        <span class="font-semibold text-gray-700 truncate text-sm sm:text-base">${friend.username}</span>
                    `;
                    div.onclick = () => openChat(friend);
                    friendsList.appendChild(div);
                });
            });
        }

        // Open Private Chat
        function openChat(friend) {
            currentChatFriend = friend;
            noChatHeader.classList.add('hidden');
            chatHeader.classList.remove('hidden');
            
            chatAvatar.src = friend.avatar;
            chatUsername.innerText = friend.username;
            
            messageInput.disabled = false;
            sendBtn.disabled = false;
            
            // Mobile Responsive Toggle
            if (window.innerWidth < 768) {
                sidebar.classList.add('hidden');
                sidebar.classList.remove('flex');
                chatArea.classList.remove('hidden', 'md:flex');
                chatArea.classList.add('flex');
            }
            
            // Timeout to allow mobile UI to transition before focusing
            setTimeout(() => { messageInput.focus(); }, 100);
            
            const chatId = currentUserDoc.uid < friend.uid ? 
                `${currentUserDoc.uid}_${friend.uid}` : 
                `${friend.uid}_${currentUserDoc.uid}`;
                
            if (messagesUnsubscribe) messagesUnsubscribe();
            
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    displayMessage(docSnap.data());
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }

        // Back to Sidebar (Mobile)
        backToSidebarBtn.addEventListener('click', () => {
            currentChatFriend = null;
            sidebar.classList.remove('hidden');
            sidebar.classList.add('flex');
            chatArea.classList.add('hidden', 'md:flex');
            chatArea.classList.remove('flex');
        });

        // Handle window resize for responsiveness
        function handleResponsiveLayout() {
            if (!currentUserDoc) return;
            if (window.innerWidth >= 768) {
                sidebar.classList.remove('hidden');
                sidebar.classList.add('flex');
                chatArea.classList.remove('hidden');
                chatArea.classList.add('md:flex');
            } else {
                if (currentChatFriend) {
                    sidebar.classList.add('hidden');
                    sidebar.classList.remove('flex');
                    chatArea.classList.remove('hidden');
                    chatArea.classList.add('flex');
                } else {
                    sidebar.classList.remove('hidden');
                    sidebar.classList.add('flex');
                    chatArea.classList.add('hidden');
                    chatArea.classList.remove('flex');
                }
            }
        }
        
        window.addEventListener('resize', handleResponsiveLayout);

        // Display Message
        function displayMessage(msg) {
            const isMe = msg.senderId === currentUserDoc.uid;
            const msgEl = document.createElement('div');
            msgEl.className = `flex w-full space-x-2 max-w-[85%] md:max-w-[80%] ${isMe ? 'ml-auto justify-end space-x-reverse' : ''}`;
            
            const avatarUrl = isMe ? currentUserDoc.avatar : currentChatFriend.avatar;
            const senderName = isMe ? currentUserDoc.username : currentChatFriend.username;
            
            const avatarHtml = `<img src="${avatarUrl}" class="h-6 w-6 sm:h-8 sm:w-8 rounded-full object-cover flex-shrink-0 mt-4 shadow-sm">`;
            
            const contentHtml = `
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    <span class="text-[10px] sm:text-[11px] text-gray-400 mb-1 px-1 font-medium">${senderName}</span>
                    <div class="px-3 py-2 sm:px-4 sm:py-2.5 text-sm rounded-2xl ${isMe ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white border border-gray-200 text-gray-800 rounded-tl-none'} shadow-sm break-words max-w-full">
                        ${escapeHtml(msg.text)}
                    </div>
                </div>
            `;

            if (isMe) {
                msgEl.innerHTML = contentHtml + avatarHtml;
            } else {
                msgEl.innerHTML = avatarHtml + contentHtml;
            }

            messagesDiv.appendChild(msgEl);
        }

        // Send Message
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (text && currentChatFriend) {
                messageInput.value = '';
                messageInput.focus();
                
                const chatId = currentUserDoc.uid < currentChatFriend.uid ? 
                    `${currentUserDoc.uid}_${currentChatFriend.uid}` : 
                    `${currentChatFriend.uid}_${currentUserDoc.uid}`;
                    
                try {
                    await addDoc(collection(db, "chats", chatId, "messages"), {
                        senderId: currentUserDoc.uid,
                        text: text,
                        timestamp: serverTimestamp()
                    });
                } catch (error) {
                    console.error("Error sending message: ", error);
                }
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Utility to prevent XSS
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
