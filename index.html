<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat - Firebase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for chat */
        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-track {
            background: transparent;
        }
        #messages::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-indigo-500 to-purple-600 text-gray-800 font-sans">
    
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col h-[600px] border border-white/20">
        
        <!-- Join Screen -->
        <div id="join-screen" class="flex flex-col items-center justify-center h-full p-8 text-center">
            <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mb-6 shadow-inner">
                <svg class="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            </div>
            <h2 class="text-3xl font-bold mb-2 text-gray-800">Join Live Chat</h2>
            <p class="text-gray-500 mb-8 text-sm">Sign in with your Google account to join the room</p>
            
            <div class="w-full space-y-4 text-left">
                <button id="google-login-btn" class="w-full bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-3 px-4 rounded-xl transition duration-200 shadow-sm flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign in with Google
                </button>
            </div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" class="hidden flex-col h-full bg-gray-50">
            <!-- Chat Header -->
            <div class="bg-white px-4 py-4 flex items-center justify-between shadow-sm border-b z-10">
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-bold" id="header-avatar">
                            #
                        </div>
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
                    </div>
                    <div>
                        <h2 class="font-bold text-gray-800 text-sm">Public Room</h2>
                        <p class="text-xs text-green-500 font-medium">Online</p>
                    </div>
                </div>
                <button id="leave-btn" class="text-gray-400 hover:text-red-500 transition" title="Sign Out">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
            
            <!-- Messages Area -->
            <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Messages will be dynamically injected here -->
            </div>
            
            <!-- Input Area -->
            <div class="bg-white p-3 border-t flex items-center gap-2">
                <input id="message-input" type="text" class="flex-1 px-4 py-3 bg-gray-100 rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-800 text-sm" placeholder="Type your message...">
                <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-full p-3 flex items-center justify-center transition duration-200 shadow-md">
                    <svg class="w-5 h-5 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
        </div>

    </div>

    <script type="module">
        // Import Firebase core, Auth, and Firestore
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // Firebase configuration provided by user
        const firebaseConfig = {
            apiKey: "AIzaSyDG3Etn46FE_79QQZuFnUJpY_fExfagSJc",
            authDomain: "webchatmanzcode.firebaseapp.com",
            projectId: "webchatmanzcode",
            storageBucket: "webchatmanzcode.firebasestorage.app",
            messagingSenderId: "449247016674",
            appId: "1:449247016674:web:fb7a3d2710dc2c7f0c50bb",
            measurementId: "G-PSL7NY1L6V"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // App State
        let currentUser = { name: '', avatar: '' };
        let unsubscribe = null;

        // DOM Elements
        const joinScreen = document.getElementById('join-screen');
        const chatScreen = document.getElementById('chat-screen');
        const googleLoginBtn = document.getElementById('google-login-btn');
        const leaveBtn = document.getElementById('leave-btn');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const headerAvatar = document.getElementById('header-avatar');

        // Google Login
        googleLoginBtn.addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                const name = user.displayName || 'Anonymous';
                const avatarUrl = user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(name)}`;
                
                currentUser = { name, avatar: avatarUrl };
                
                headerAvatar.innerHTML = `<img src="${avatarUrl}" class="w-full h-full rounded-full object-cover">`;
                
                joinScreen.classList.add('hidden');
                chatScreen.classList.remove('hidden');
                chatScreen.classList.add('flex');
                
                loadMessages();
            } catch (error) {
                console.error("Error signing in with Google: ", error);
                alert("Failed to sign in with Google. Please try again.");
            }
        });

        // Leave Chat / Sign Out
        leaveBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
                if(unsubscribe) unsubscribe();
                chatScreen.classList.add('hidden');
                chatScreen.classList.remove('flex');
                joinScreen.classList.remove('hidden');
                messagesDiv.innerHTML = '';
                currentUser = { name: '', avatar: '' };
            } catch (error) {
                console.error("Error signing out: ", error);
            }
        });

        // Load Messages from Firestore
        function loadMessages() {
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            unsubscribe = onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        displayMessage(change.doc.data());
                    }
                });
            });
        }

        // Display Message in UI
        function displayMessage(msg) {
            const isMe = msg.name === currentUser.name;
            const msgEl = document.createElement('div');
            msgEl.className = `flex w-full space-x-2 max-w-[85%] ${isMe ? 'ml-auto justify-end space-x-reverse' : ''}`;
            
            const avatarHtml = `<img src="${msg.avatar}" alt="Avatar" class="h-8 w-8 rounded-full object-cover flex-shrink-0 mt-4">`;
            
            const contentHtml = `
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    <span class="text-[11px] text-gray-500 mb-1 px-1">${msg.name}</span>
                    <div class="px-4 py-2 text-sm rounded-2xl ${isMe ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white border border-gray-200 text-gray-800 rounded-tl-none'} shadow-sm">
                        ${escapeHtml(msg.text)}
                    </div>
                </div>
            `;

            if (isMe) {
                msgEl.innerHTML = contentHtml + avatarHtml;
            } else {
                msgEl.innerHTML = avatarHtml + contentHtml;
            }

            messagesDiv.appendChild(msgEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Send Message
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (text) {
                messageInput.value = '';
                messageInput.focus();
                try {
                    await addDoc(collection(db, "messages"), {
                        name: currentUser.name,
                        avatar: currentUser.avatar,
                        text: text,
                        timestamp: serverTimestamp()
                    });
                } catch (error) {
                    console.error("Error sending message: ", error);
                }
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Utility to prevent XSS
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
