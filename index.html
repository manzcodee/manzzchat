<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="GvyTGbIx3Zov0CXr0f1voJ2LJnac-ppCl62NStzdY3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ManzChat - Live Chat & Shorts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for chat */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        
        /* Safe area padding for mobile devices */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        
        /* Video Feed Snap */
        .snap-y-mandatory { scroll-snap-type: y mandatory; }
        .snap-start { scroll-snap-align: start; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-white md:bg-gradient-to-br md:from-indigo-500 md:to-purple-600 text-gray-800 font-sans md:p-4 overflow-hidden">
    
    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-white flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="flex flex-col items-center animate-slide-up">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mb-4"></div>
            <p class="text-indigo-600 font-medium">Loading...</p>
        </div>
    </div>

    <!-- Container -->
    <div class="w-full h-[100dvh] md:h-[700px] md:max-w-6xl bg-white md:rounded-2xl shadow-none md:shadow-2xl overflow-hidden flex border-none md:border md:border-white/20 relative animate-fade-in">
        
        <!-- Join Screen -->
        <div id="join-screen" class="hidden flex-col items-center justify-center w-full h-full p-6 sm:p-8 text-center bg-white absolute inset-0 z-40">
            <div class="w-20 h-20 sm:w-24 sm:h-24 bg-indigo-100 rounded-full flex items-center justify-center mb-6 shadow-inner animate-slide-up">
                <svg class="w-10 h-10 sm:w-12 sm:h-12 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            </div>
            <h2 class="text-3xl sm:text-4xl font-bold mb-2 text-indigo-600 animate-slide-up" style="animation-delay: 0.1s">ManzChat</h2>
            <p class="text-gray-500 mb-8 text-sm sm:text-base animate-slide-up" style="animation-delay: 0.2s">Sign in to connect, chat, and watch videos</p>
            
            <div class="w-full max-w-sm space-y-4 text-left animate-slide-up" style="animation-delay: 0.3s">
                <button id="google-login-btn" class="w-full bg-white border border-gray-300 hover:bg-gray-50 hover:scale-105 text-gray-700 font-medium py-3 px-4 rounded-xl transition duration-200 shadow-sm flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign in with Google
                </button>
            </div>
        </div>

        <!-- Main Dashboard & Chat Screen -->
        <div id="main-screen" class="hidden w-full h-full flex-col md:flex-row relative">
            
            <!-- Sidebar -->
            <div id="sidebar" class="w-full md:w-1/3 lg:w-1/4 bg-gray-50 md:border-r flex flex-col h-full absolute md:relative z-20 transition-transform duration-300">
                <!-- Branding -->
                <div class="p-4 bg-indigo-600 text-white flex justify-between items-center shadow-md z-10 pt-safe">
                    <h1 class="text-xl font-bold tracking-wide">ManzChat</h1>
                    <button id="leave-btn" class="text-indigo-200 hover:text-white transition p-1" title="Sign Out">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>

                <!-- User Profile -->
                <div class="p-4 bg-white border-b flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <img id="my-avatar" src="" class="w-12 h-12 rounded-full object-cover border-2 border-indigo-100 flex-shrink-0">
                        <div class="flex flex-col truncate">
                            <span id="my-username" class="font-bold text-gray-800 truncate text-sm sm:text-base"></span>
                            <span id="my-status" class="text-xs text-green-500 font-medium">Online</span>
                        </div>
                    </div>
                    <button id="open-edit-modal-btn" class="text-gray-400 hover:text-indigo-600 transition p-2 bg-gray-100 rounded-full flex-shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                    </button>
                </div>

                <!-- Tabs -->
                <div class="flex bg-white border-b shadow-sm">
                    <button id="tab-private" class="flex-1 py-3 text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 transition">Chats</button>
                    <button id="tab-public" class="flex-1 py-3 text-sm font-bold text-gray-500 border-b-2 border-transparent hover:text-indigo-500 transition">Public</button>
                    <button id="tab-videos" class="flex-1 py-3 text-sm font-bold text-gray-500 border-b-2 border-transparent hover:text-indigo-500 transition">Videos</button>
                </div>

                <!-- Tab Content: Private Chats -->
                <div id="panel-private" class="flex-1 flex flex-col overflow-hidden">
                    <div class="p-3 border-b bg-gray-50">
                        <div class="flex gap-2">
                            <input id="friend-username-input" type="text" placeholder="Add friend username..." class="flex-1 px-3 py-2 bg-white border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            <button id="add-friend-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg text-sm font-medium transition shadow-sm">Add</button>
                        </div>
                    </div>
                    <div class="flex-1 overflow-y-auto p-2 pb-safe md:pb-2">
                        <div id="friends-list" class="space-y-1"></div>
                    </div>
                </div>

            </div>
            
            <!-- Chat / Video Area -->
            <div id="main-content-area" class="hidden md:flex w-full md:w-2/3 lg:w-3/4 flex-col bg-white h-full absolute md:relative inset-0 md:inset-auto z-30 md:z-10 animate-fade-in">
                
                <!-- Chat Header -->
                <div id="chat-header" class="bg-white px-4 py-3 md:px-6 md:py-4 flex items-center justify-between shadow-sm border-b z-10 hidden pt-safe">
                    <div class="flex items-center gap-3 md:gap-4">
                        <button id="back-to-sidebar-btn" class="md:hidden p-2 -ml-2 text-gray-500 hover:text-indigo-600 transition rounded-full hover:bg-gray-100">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <img id="chat-avatar" src="" class="w-10 h-10 rounded-full object-cover shadow-sm">
                        <div class="flex flex-col">
                            <h2 id="chat-username" class="font-bold text-gray-800 text-base md:text-lg leading-tight"></h2>
                            <p id="chat-status" class="text-xs text-gray-500 font-medium"></p>
                        </div>
                    </div>
                    <!-- Call Buttons -->
                    <div id="call-buttons" class="flex gap-2 text-indigo-600">
                        <button class="p-2 bg-indigo-50 rounded-full hover:bg-indigo-100 transition" onclick="openCallModal('voice')">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        </button>
                        <button class="p-2 bg-indigo-50 rounded-full hover:bg-indigo-100 transition" onclick="openCallModal('video')">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- Empty State -->
                <div id="no-chat-header" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-50 z-20 hidden md:flex animate-fade-in">
                    <div class="w-20 h-20 bg-gray-200 rounded-full flex items-center justify-center mb-4 text-gray-400">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    </div>
                    <h2 class="text-xl font-bold text-gray-400">Select a feature to start</h2>
                </div>
                
                <!-- Messages Area -->
                <div id="messages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-gray-50/50 hidden"></div>
                
                <!-- Input Area -->
                <div id="input-area" class="bg-white p-3 md:p-4 border-t flex items-center gap-2 md:gap-3 pb-safe z-10 hidden">
                    <input id="message-input" type="text" class="flex-1 px-4 py-3 bg-gray-100 rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-800 text-sm" placeholder="Type a message...">
                    <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-full p-3 flex items-center justify-center transition duration-200 shadow-md flex-shrink-0">
                        <svg class="w-5 h-5 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>

                <!-- Video Feed Area -->
                <div id="video-feed-area" class="hidden flex-1 bg-black overflow-y-scroll snap-y-mandatory relative h-full w-full">
                    <button onclick="document.getElementById('upload-video-modal').classList.remove('hidden')" class="absolute top-4 right-4 bg-white/20 hover:bg-white/40 p-2 px-4 rounded-full text-white backdrop-blur-md z-50 transition shadow-lg text-sm font-bold flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg> Upload
                    </button>
                    <div id="videos-container" class="h-full w-full"></div>
                </div>

            </div>
        </div>
    </div>

    <!-- Modals -->
    <!-- Edit Profile Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
        <div class="bg-white rounded-2xl p-6 md:p-8 w-full max-w-sm shadow-2xl animate-slide-up">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Edit Profile</h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <input id="edit-username" type="text" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Profile Picture</label>
                    <input id="edit-avatar" type="file" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                </div>
                <div class="flex justify-end gap-3 mt-8">
                    <button id="close-modal-btn" class="px-5 py-2.5 text-gray-600 font-medium hover:bg-gray-100 rounded-xl transition">Cancel</button>
                    <button id="save-profile-btn" class="px-5 py-2.5 bg-indigo-600 font-medium text-white rounded-xl hover:bg-indigo-700 shadow-md transition flex items-center justify-center min-w-[100px]">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Call Modal -->
    <div id="call-modal" class="hidden fixed inset-0 bg-gray-900/95 backdrop-blur-md flex flex-col items-center justify-center z-[60] animate-fade-in">
        <img id="call-avatar" src="" class="w-32 h-32 rounded-full border-4 border-indigo-500 mb-6 shadow-2xl animate-pulse">
        <h2 id="call-name" class="text-3xl font-bold text-white mb-2"></h2>
        <p class="text-indigo-300 mb-12" id="call-status-text">Calling...</p>
        <button onclick="document.getElementById('call-modal').classList.add('hidden')" class="bg-red-500 hover:bg-red-600 text-white p-5 rounded-full shadow-lg transition transform hover:scale-110">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 11l2 2m-2-2l-2-2m2 2l2-2m-2 2l-2 2"></path></svg>
        </button>
    </div>

    <!-- Upload Video Modal -->
    <div id="upload-video-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-slide-up">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Upload Short Video</h2>
            <input type="file" accept="video/*" id="video-file-input" class="mb-4 w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-indigo-50 file:text-indigo-700">
            <input type="text" id="video-caption-input" placeholder="Caption..." class="w-full px-4 py-2 bg-gray-50 border rounded-xl mb-6 focus:ring-2 focus:ring-indigo-500">
            <div class="flex justify-end gap-3">
                <button onclick="document.getElementById('upload-video-modal').classList.add('hidden')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-xl">Cancel</button>
                <button id="submit-video-btn" class="px-4 py-2 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700">Upload</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, getDoc, updateDoc, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDG3Etn46FE_79QQZuFnUJpY_fExfagSJc",
            authDomain: "webchatmanzcode.firebaseapp.com",
            projectId: "webchatmanzcode",
            storageBucket: "webchatmanzcode.firebasestorage.app",
            messagingSenderId: "449247016674",
            appId: "1:449247016674:web:fb7a3d2710dc2c7f0c50bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        let currentUserDoc = null;
        let currentMode = 'private'; // private, public, videos
        let currentChatFriend = null;
        let messagesUnsubscribe = null;
        let friendsUnsubscribe = null;
        let publicUnsubscribe = null;
        let videosUnsubscribe = null;

        // Elements
        const loadingScreen = document.getElementById('loading-screen');
        const joinScreen = document.getElementById('join-screen');
        const mainScreen = document.getElementById('main-screen');
        const chatHeader = document.getElementById('chat-header');
        const noChatHeader = document.getElementById('no-chat-header');
        const messagesDiv = document.getElementById('messages');
        const inputArea = document.getElementById('input-area');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const friendsList = document.getElementById('friends-list');
        const videoFeedArea = document.getElementById('video-feed-area');
        const videosContainer = document.getElementById('videos-container');
        
        // Presence Management
        async function setOnlineStatus(isOnline) {
            if(currentUserDoc) {
                await updateDoc(doc(db, "users", currentUserDoc.uid), {
                    isOnline: isOnline,
                    lastSeen: serverTimestamp()
                });
            }
        }
        window.addEventListener('beforeunload', () => setOnlineStatus(false));

        // Auth
        onAuthStateChanged(auth, async (user) => {
            loadingScreen.classList.add('hidden');
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    const generatedUsername = (user.displayName || 'User').replace(/\s+/g, '') + Math.floor(Math.random() * 1000);
                    currentUserDoc = { uid: user.uid, username: generatedUsername, avatar: user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`, isOnline: true };
                    await setDoc(userRef, currentUserDoc);
                } else {
                    currentUserDoc = userSnap.data();
                    await setOnlineStatus(true);
                }
                
                document.getElementById('my-avatar').src = currentUserDoc.avatar;
                document.getElementById('my-username').innerText = currentUserDoc.username;
                document.getElementById('edit-username').value = currentUserDoc.username;
                
                joinScreen.classList.add('hidden');
                mainScreen.classList.remove('hidden');
                mainScreen.classList.add('flex');
                
                loadFriends();
                switchTab('private');
            } else {
                if(currentUserDoc) setOnlineStatus(false);
                joinScreen.classList.remove('hidden');
                joinScreen.classList.add('flex');
                mainScreen.classList.add('hidden');
                mainScreen.classList.remove('flex');
                currentUserDoc = null;
            }
        });

        document.getElementById('google-login-btn').addEventListener('click', () => signInWithPopup(auth, provider));
        document.getElementById('leave-btn').addEventListener('click', () => signOut(auth));

        // Tabs Logic
        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tab-private').classList.remove('text-indigo-600', 'border-indigo-600');
            document.getElementById('tab-public').classList.remove('text-indigo-600', 'border-indigo-600');
            document.getElementById('tab-videos').classList.remove('text-indigo-600', 'border-indigo-600');
            
            document.getElementById(`tab-${mode}`).classList.add('text-indigo-600', 'border-indigo-600');
            
            // Reset views
            chatHeader.classList.add('hidden');
            noChatHeader.classList.remove('hidden');
            messagesDiv.classList.add('hidden');
            inputArea.classList.add('hidden');
            videoFeedArea.classList.add('hidden');
            if(messagesUnsubscribe) messagesUnsubscribe();
            if(publicUnsubscribe) publicUnsubscribe();
            
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('hidden');
                document.getElementById('main-content-area').classList.remove('hidden');
                document.getElementById('main-content-area').classList.add('flex');
            }

            if(mode === 'private') {
                if(window.innerWidth < 768) {
                    document.getElementById('sidebar').classList.remove('hidden');
                    document.getElementById('main-content-area').classList.add('hidden');
                }
                noChatHeader.classList.remove('hidden');
            } else if(mode === 'public') {
                openPublicChat();
            } else if(mode === 'videos') {
                openVideoFeed();
            }
        }

        document.getElementById('tab-private').addEventListener('click', () => switchTab('private'));
        document.getElementById('tab-public').addEventListener('click', () => switchTab('public'));
        document.getElementById('tab-videos').addEventListener('click', () => switchTab('videos'));
        
        document.getElementById('back-to-sidebar-btn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content-area').classList.add('hidden');
            switchTab('private');
        });

        // Load Friends & Last Message
        function loadFriends() {
            const q = query(collection(db, "users", currentUserDoc.uid, "friends"));
            friendsUnsubscribe = onSnapshot(q, (snapshot) => {
                friendsList.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const friend = docSnap.data();
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-3 p-3 hover:bg-indigo-50 rounded-xl cursor-pointer transition border border-transparent hover:border-indigo-100";
                    div.innerHTML = `
                        <div class="relative">
                            <img src="${friend.avatar}" class="w-12 h-12 rounded-full object-cover shadow-sm">
                        </div>
                        <div class="flex flex-col flex-1 truncate">
                            <span class="font-bold text-gray-800 text-sm truncate">${friend.username}</span>
                            <span class="text-xs text-gray-500 truncate" id="last-msg-${friend.uid}">Tap to chat...</span>
                        </div>
                    `;
                    div.onclick = () => openPrivateChat(friend);
                    friendsList.appendChild(div);

                    // Fetch last message
                    const chatId = currentUserDoc.uid < friend.uid ? `${currentUserDoc.uid}_${friend.uid}` : `${friend.uid}_${currentUserDoc.uid}`;
                    const msgQ = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "desc"), limit(1));
                    onSnapshot(msgQ, (msgSnap) => {
                        if(!msgSnap.empty) {
                            const msgData = msgSnap.docs[0].data();
                            const msgEl = document.getElementById(`last-msg-${friend.uid}`);
                            if(msgEl) msgEl.innerText = msgData.text;
                        }
                    });
                });
            });
        }

        // Add Friend
        document.getElementById('add-friend-btn').addEventListener('click', async () => {
            const username = document.getElementById('friend-username-input').value.trim();
            if(!username || username === currentUserDoc.username) return;
            const q = query(collection(db, "users"), where("username", "==", username));
            const snap = await getDocs(q);
            if(!snap.empty) {
                const friendDoc = snap.docs[0].data();
                await setDoc(doc(db, "users", currentUserDoc.uid, "friends", friendDoc.uid), { uid: friendDoc.uid, username: friendDoc.username, avatar: friendDoc.avatar });
                await setDoc(doc(db, "users", friendDoc.uid, "friends", currentUserDoc.uid), { uid: currentUserDoc.uid, username: currentUserDoc.username, avatar: currentUserDoc.avatar });
                document.getElementById('friend-username-input').value = '';
                alert("Friend added!");
            } else { alert("User not found!"); }
        });

        // Time formatter
        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return "Just now";
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            return `${Math.floor(hours / 24)}d ago`;
        }

        // Open Private Chat
        window.openPrivateChat = function(friend) {
            currentMode = 'private';
            currentChatFriend = friend;
            noChatHeader.classList.add('hidden');
            chatHeader.classList.remove('hidden');
            messagesDiv.classList.remove('hidden');
            inputArea.classList.remove('hidden');
            document.getElementById('call-buttons').classList.remove('hidden');
            
            document.getElementById('chat-avatar').src = friend.avatar;
            document.getElementById('chat-username').innerText = friend.username;
            
            // Listen to friend's presence
            onSnapshot(doc(db, "users", friend.uid), (docSnap) => {
                if(docSnap.exists()) {
                    const data = docSnap.data();
                    const statusEl = document.getElementById('chat-status');
                    if(data.isOnline) {
                        statusEl.innerText = 'Online';
                        statusEl.classList.replace('text-gray-500', 'text-green-500');
                    } else {
                        const last = data.lastSeen ? data.lastSeen.toDate() : new Date();
                        statusEl.innerText = 'Last seen ' + timeAgo(last);
                        statusEl.classList.replace('text-green-500', 'text-gray-500');
                    }
                }
            });

            if(messagesUnsubscribe) messagesUnsubscribe();
            const chatId = currentUserDoc.uid < friend.uid ? `${currentUserDoc.uid}_${friend.uid}` : `${friend.uid}_${currentUserDoc.uid}`;
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                snapshot.forEach((docSnap) => displayMessage(docSnap.data()));
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        };

        // Open Public Chat
        function openPublicChat() {
            noChatHeader.classList.add('hidden');
            chatHeader.classList.remove('hidden');
            messagesDiv.classList.remove('hidden');
            inputArea.classList.remove('hidden');
            document.getElementById('call-buttons').classList.add('hidden');
            
            document.getElementById('chat-avatar').src = 'https://api.dicebear.com/7.x/shapes/svg?seed=public';
            document.getElementById('chat-username').innerText = 'Public Global Chat';
            document.getElementById('chat-status').innerText = 'Everyone is here';

            const q = query(collection(db, "public_messages"), orderBy("timestamp", "asc"));
            publicUnsubscribe = onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                snapshot.forEach((docSnap) => displayMessage(docSnap.data()));
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }

        // Display Message
        function displayMessage(msg) {
            const isMe = msg.senderId === currentUserDoc.uid;
            const msgEl = document.createElement('div');
            msgEl.className = `flex w-full space-x-2 max-w-[85%] md:max-w-[80%] animate-slide-up ${isMe ? 'ml-auto justify-end space-x-reverse' : ''}`;
            
            const timeString = msg.timestamp ? msg.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
            
            msgEl.innerHTML = `
                ${!isMe ? `<img src="${msg.avatar}" class="h-8 w-8 rounded-full object-cover mt-4 shadow-sm">` : ''}
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    <span class="text-[10px] text-gray-400 mb-1 px-1 font-medium">${msg.senderName}</span>
                    <div class="px-3 py-2 text-sm rounded-2xl ${isMe ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white border text-gray-800 rounded-tl-none'} shadow-sm break-words max-w-full">
                        <span>${msg.text}</span>
                        <div class="text-[10px] text-right mt-1 opacity-70">${timeString}</div>
                    </div>
                </div>
                ${isMe ? `<img src="${msg.avatar}" class="h-8 w-8 rounded-full object-cover mt-4 shadow-sm">` : ''}
            `;
            messagesDiv.appendChild(msgEl);
        }

        // Send Message
        sendBtn.addEventListener('click', async () => {
            const text = messageInput.value.trim();
            if(!text) return;
            messageInput.value = '';
            
            const msgData = {
                senderId: currentUserDoc.uid,
                senderName: currentUserDoc.username,
                avatar: currentUserDoc.avatar,
                text: text,
                timestamp: serverTimestamp()
            };

            if(currentMode === 'private' && currentChatFriend) {
                const chatId = currentUserDoc.uid < currentChatFriend.uid ? `${currentUserDoc.uid}_${currentChatFriend.uid}` : `${currentChatFriend.uid}_${currentUserDoc.uid}`;
                await addDoc(collection(db, "chats", chatId, "messages"), msgData);
            } else if(currentMode === 'public') {
                await addDoc(collection(db, "public_messages"), msgData);
            }
        });

        // Call Modal logic
        window.openCallModal = function(type) {
            document.getElementById('call-avatar').src = currentChatFriend.avatar;
            document.getElementById('call-name').innerText = currentChatFriend.username;
            document.getElementById('call-status-text').innerText = type === 'video' ? 'Starting Video Call...' : 'Ringing...';
            document.getElementById('call-modal').classList.remove('hidden');
        };

        // Video Feed Logic
        function openVideoFeed() {
            noChatHeader.classList.add('hidden');
            videoFeedArea.classList.remove('hidden');
            
            const q = query(collection(db, "videos"), orderBy("timestamp", "desc"));
            if(videosUnsubscribe) videosUnsubscribe();
            videosUnsubscribe = onSnapshot(q, (snapshot) => {
                videosContainer.innerHTML = '';
                if(snapshot.empty) {
                    videosContainer.innerHTML = `<div class="text-white text-center mt-20">No videos yet. Be the first to upload!</div>`;
                }
                snapshot.forEach(docSnap => {
                    const video = docSnap.data();
                    const vId = docSnap.id;
                    const div = document.createElement('div');
                    div.className = "w-full h-full snap-start relative bg-black flex items-center justify-center";
                    div.innerHTML = `
                        <video src="${video.url}" loop class="w-full h-full object-cover" onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="absolute bottom-4 left-4 text-white z-10 w-2/3">
                            <h3 class="font-bold text-lg drop-shadow-md">@${video.uploaderName}</h3>
                            <p class="text-sm drop-shadow-md">${video.caption}</p>
                        </div>
                        <div class="absolute right-4 bottom-20 flex flex-col gap-6 items-center z-10">
                            <div class="relative flex flex-col items-center">
                                <img src="${video.uploaderAvatar}" class="w-12 h-12 rounded-full border-2 border-white shadow-lg">
                                ${video.uploaderId !== currentUserDoc.uid ? `<button onclick="addVideoFriend('${video.uploaderName}')" class="bg-indigo-600 text-white text-[10px] w-6 h-6 rounded-full absolute -bottom-2 flex items-center justify-center shadow-lg">+</button>` : ''}
                            </div>
                            <button class="flex flex-col items-center text-white drop-shadow-md hover:scale-110 transition" onclick="likeVideo('${vId}')">
                                <svg class="w-8 h-8 ${video.likes && video.likes.includes(currentUserDoc.uid) ? 'text-red-500 fill-current' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                                <span class="text-xs mt-1">${video.likes ? video.likes.length : 0}</span>
                            </button>
                            <button class="flex flex-col items-center text-white drop-shadow-md hover:scale-110 transition">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                                <span class="text-xs mt-1">Chat</span>
                            </button>
                        </div>
                    `;
                    videosContainer.appendChild(div);
                });
                // Auto play first video if exists
                const firstVid = videosContainer.querySelector('video');
                if(firstVid) firstVid.play().catch(()=>{});
            });
        }

        // Upload Video
        document.getElementById('submit-video-btn').addEventListener('click', async () => {
            const file = document.getElementById('video-file-input').files[0];
            const caption = document.getElementById('video-caption-input').value;
            if(!file) return alert("Select a video!");
            
            const btn = document.getElementById('submit-video-btn');
            btn.innerText = "Uploading...";
            btn.disabled = true;
            
            try {
                const storageRef = ref(storage, `videos/${currentUserDoc.uid}_${Date.now()}`);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);
                
                await addDoc(collection(db, "videos"), {
                    url: url,
                    caption: caption,
                    uploaderId: currentUserDoc.uid,
                    uploaderName: currentUserDoc.username,
                    uploaderAvatar: currentUserDoc.avatar,
                    likes: [],
                    timestamp: serverTimestamp()
                });
                
                document.getElementById('upload-video-modal').classList.add('hidden');
                document.getElementById('video-file-input').value = '';
                document.getElementById('video-caption-input').value = '';
            } catch(e) {
                console.error(e);
                alert("Upload failed");
            } finally {
                btn.innerText = "Upload";
                btn.disabled = false;
            }
        });

        // Like Video
        window.likeVideo = async function(videoId) {
            const videoRef = doc(db, "videos", videoId);
            const snap = await getDoc(videoRef);
            if(snap.exists()) {
                let likes = snap.data().likes || [];
                if(likes.includes(currentUserDoc.uid)) {
                    likes = likes.filter(id => id !== currentUserDoc.uid);
                } else {
                    likes.push(currentUserDoc.uid);
                }
                await updateDoc(videoRef, { likes: likes });
            }
        };

        // Add Uploader as Friend
        window.addVideoFriend = async function(username) {
            document.getElementById('friend-username-input').value = username;
            document.getElementById('add-friend-btn').click();
        };

        // Modals
        document.getElementById('open-edit-modal-btn').addEventListener('click', () => document.getElementById('edit-modal').classList.remove('hidden'));
        document.getElementById('close-modal-btn').addEventListener('click', () => document.getElementById('edit-modal').classList.add('hidden'));

    </script>
</body>
</html>
