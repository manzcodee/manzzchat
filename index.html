<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom scrollbar for chat */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .chat-bg {
            background-color: #efeae2;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
        }
    </style>
</head>
<body class="bg-gray-100 h-screen w-screen overflow-hidden font-sans text-gray-800">

    <!-- Login Screen -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-teal-500 to-emerald-600 hidden">
        <div class="text-center p-10 bg-white rounded-2xl shadow-2xl max-w-md w-full">
            <i class="fa-brands fa-whatsapp text-6xl text-teal-500 mb-4"></i>
            <h1 class="text-3xl font-bold mb-2 text-gray-800">Welcome to WebChat</h1>
            <p class="text-gray-500 mb-8">Sign in to start messaging with friends.</p>
            <button id="btn-login" class="w-full flex items-center justify-center gap-3 px-6 py-3 bg-white border border-gray-300 rounded-lg shadow-sm hover:bg-gray-50 transition font-semibold text-gray-700">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-6 h-6">
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- Setup Profile Screen -->
    <div id="setup-screen" class="flex items-center justify-center min-h-screen bg-gray-100 hidden">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full text-center">
            <h2 class="text-2xl font-bold mb-6">Complete Your Profile</h2>
            <div class="mb-6 relative w-32 h-32 mx-auto">
                <img id="setup-preview" src="https://via.placeholder.com/150" class="w-32 h-32 rounded-full object-cover border-4 border-teal-500">
                <label for="setup-upload" class="absolute bottom-0 right-0 bg-teal-500 text-white p-2 rounded-full cursor-pointer hover:bg-teal-600">
                    <i class="fa-solid fa-camera"></i>
                </label>
                <input type="file" id="setup-upload" class="hidden" accept="image/*">
            </div>
            <input type="text" id="setup-username" placeholder="Choose a username" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-teal-500 mb-4">
            <button id="btn-save-setup" class="w-full bg-teal-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-teal-600 transition">Save & Continue</button>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="main-screen" class="flex h-screen w-full bg-white hidden">
        
        <!-- Sidebar -->
        <div class="w-1/3 border-r flex flex-col bg-white min-w-[300px]">
            <!-- Header -->
            <div class="bg-gray-100 h-16 flex items-center justify-between px-4 border-b">
                <div class="flex items-center gap-3 cursor-pointer" id="btn-open-settings">
                    <img id="my-avatar" src="https://via.placeholder.com/150" class="w-10 h-10 rounded-full object-cover">
                    <div>
                        <p id="my-username" class="font-semibold text-sm">Username</p>
                        <p id="my-id" class="text-xs text-gray-500">ID: #0000</p>
                    </div>
                </div>
                <div class="flex gap-4 text-gray-500">
                    <button id="btn-add-friend" class="hover:text-teal-600"><i class="fa-solid fa-user-plus"></i></button>
                    <button id="btn-logout" class="hover:text-red-500"><i class="fa-solid fa-sign-out-alt"></i></button>
                </div>
            </div>
            
            <!-- Search -->
            <div class="p-2 border-b bg-white">
                <div class="relative">
                    <i class="fa-solid fa-search absolute left-3 top-3 text-gray-400 text-sm"></i>
                    <input type="text" placeholder="Search or start new chat" class="w-full bg-gray-100 rounded-lg pl-10 pr-4 py-2 text-sm focus:outline-none">
                </div>
            </div>

            <!-- Friend List -->
            <div id="friend-list" class="flex-1 overflow-y-auto">
                <!-- Friends injected here -->
            </div>
        </div>

        <!-- Chat Area -->
        <div class="flex-1 flex flex-col chat-bg relative">
            <!-- Default Placeholder -->
            <div id="chat-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-50 z-10">
                <img src="https://cdn-icons-png.flaticon.com/512/1041/1041916.png" class="w-32 h-32 opacity-20 mb-4">
                <h2 class="text-2xl text-gray-500 font-light">WebChat for Web</h2>
                <p class="text-gray-400 mt-2">Select a chat to start messaging</p>
            </div>

            <!-- Chat Header -->
            <div id="chat-header" class="bg-gray-100 h-16 flex items-center px-4 border-b hidden z-20">
                <img id="chat-avatar" src="https://via.placeholder.com/150" class="w-10 h-10 rounded-full object-cover">
                <div class="ml-4">
                    <h3 id="chat-name" class="font-semibold">Friend Name</h3>
                    <p id="chat-status" class="text-xs text-gray-500">last seen today at 12:00</p>
                </div>
            </div>

            <!-- Messages -->
            <div id="messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2 hidden z-20">
                <!-- Messages injected here -->
            </div>

            <!-- Chat Input -->
            <div id="chat-input-area" class="bg-gray-100 px-4 py-3 flex items-center gap-2 hidden z-20">
                <label for="chat-image-upload" class="text-gray-500 hover:text-gray-700 cursor-pointer p-2">
                    <i class="fa-solid fa-paperclip text-xl"></i>
                </label>
                <input type="file" id="chat-image-upload" class="hidden" accept="image/*">
                <input type="text" id="chat-input" placeholder="Type a message" class="flex-1 rounded-lg px-4 py-2 focus:outline-none border-none">
                <button id="btn-send" class="text-teal-600 hover:text-teal-700 p-2">
                    <i class="fa-solid fa-paper-plane text-xl"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <!-- Settings Modal -->
    <div id="modal-settings" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-96 p-6 relative">
            <button class="absolute top-4 right-4 text-gray-400 hover:text-gray-600" onclick="document.getElementById('modal-settings').classList.replace('flex', 'hidden')">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <h2 class="text-xl font-bold mb-4">Settings</h2>
            <div class="flex flex-col items-center">
                <div class="relative w-24 h-24 mb-4">
                    <img id="settings-preview" src="" class="w-24 h-24 rounded-full object-cover border-2 border-teal-500">
                    <label for="settings-upload" class="absolute bottom-0 right-0 bg-teal-500 text-white p-1.5 rounded-full cursor-pointer text-xs hover:bg-teal-600">
                        <i class="fa-solid fa-pen"></i>
                    </label>
                    <input type="file" id="settings-upload" class="hidden" accept="image/*">
                </div>
                <input type="text" id="settings-username" class="w-full border p-2 rounded mb-2 text-center" placeholder="Username">
                <p id="settings-id" class="text-sm text-gray-500 mb-4">ID: #0000</p>
                <button id="btn-save-settings" class="w-full bg-teal-500 text-white py-2 rounded font-semibold hover:bg-teal-600">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Add Friend Modal -->
    <div id="modal-add-friend" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-96 p-6 relative">
            <button class="absolute top-4 right-4 text-gray-400 hover:text-gray-600" onclick="document.getElementById('modal-add-friend').classList.replace('flex', 'hidden')">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <h2 class="text-xl font-bold mb-4">Add Friend</h2>
            <p class="text-sm text-gray-600 mb-4">Enter username or ID to add a friend.</p>
            <div class="flex gap-2 mb-4">
                <input type="text" id="input-friend-search" class="flex-1 border p-2 rounded focus:outline-teal-500" placeholder="Username or #ID">
                <button id="btn-search-friend" class="bg-teal-500 text-white px-4 py-2 rounded hover:bg-teal-600">Search</button>
            </div>
            <div id="search-result" class="hidden border rounded p-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img id="search-result-avatar" src="" class="w-10 h-10 rounded-full object-cover">
                    <div>
                        <p id="search-result-name" class="font-semibold text-sm"></p>
                        <p id="search-result-id" class="text-xs text-gray-500"></p>
                    </div>
                </div>
                <button id="btn-add-found-friend" class="text-teal-600 font-semibold text-sm hover:underline">Add</button>
            </div>
            <p id="search-error" class="text-red-500 text-sm hidden mt-2">User not found.</p>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-white z-[100] flex items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-teal-500"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, onSnapshot, addDoc, serverTimestamp, orderBy, arrayUnion } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDG3Etn46FE_79QQZuFnUJpY_fExfagSJc",
            authDomain: "webchatmanzcode.firebaseapp.com",
            projectId: "webchatmanzcode",
            storageBucket: "webchatmanzcode.firebasestorage.app",
            messagingSenderId: "449247016674",
            appId: "1:449247016674:web:fb7a3d2710dc2c7f0c50bb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUserData = null;
        let currentChatFriend = null;
        let currentChatId = null;
        let unsubscribeMessages = null;
        let unsubscribeFriends = [];

        // DOM Elements
        const screens = {
            loading: document.getElementById('loading'),
            login: document.getElementById('login-screen'),
            setup: document.getElementById('setup-screen'),
            main: document.getElementById('main-screen')
        };

        function showScreen(screenName) {
            Object.values(screens).forEach(s => { if(s) s.classList.add('hidden'); s.classList.remove('flex'); });
            screens[screenName].classList.remove('hidden');
            screens[screenName].classList.add('flex');
        }

        // Generate ID
        function generateId() {
            return '#' + Math.floor(1000 + Math.random() * 9000);
        }

        // Format Time
        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Auth State
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    currentUserData = userDoc.data();
                    await updateDoc(doc(db, "users", user.uid), { isOnline: true, lastSeen: serverTimestamp() });
                    initMainApp();
                } else {
                    showScreen('setup');
                }
            } else {
                showScreen('login');
            }
        });

        // Login
        document.getElementById('btn-login').addEventListener('click', () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch(err => console.error(err));
        });

        // Logout
        document.getElementById('btn-logout').addEventListener('click', async () => {
            if(auth.currentUser) {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { isOnline: false, lastSeen: serverTimestamp() });
            }
            signOut(auth);
        });

        // Setup Profile
        let setupFile = null;
        document.getElementById('setup-upload').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                setupFile = e.target.files[0];
                document.getElementById('setup-preview').src = URL.createObjectURL(setupFile);
            }
        });

        document.getElementById('btn-save-setup').addEventListener('click', async () => {
            const username = document.getElementById('setup-username').value.trim();
            if (!username) return alert('Username required');
            
            screens.loading.classList.remove('hidden');
            screens.loading.classList.add('flex');

            let photoURL = auth.currentUser.photoURL || 'https://via.placeholder.com/150';
            if (setupFile) {
                photoURL = await uploadImage(setupFile, `profiles/${auth.currentUser.uid}`);
            }

            const publicId = generateId();
            const userData = {
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                username: username,
                publicId: publicId,
                photoURL: photoURL,
                friends: [],
                isOnline: true,
                lastSeen: serverTimestamp()
            };

            await setDoc(doc(db, "users", auth.currentUser.uid), userData);
            currentUserData = userData;
            initMainApp();
        });

        // Upload Image Helper
        async function uploadImage(file, path) {
            const storageRef = ref(storage, path + '_' + Date.now());
            const snapshot = await uploadBytesResumable(storageRef, file);
            return await getDownloadURL(snapshot.ref);
        }

        // Initialize Main App
        function initMainApp() {
            showScreen('main');
            document.getElementById('my-username').innerText = currentUserData.username;
            document.getElementById('my-id').innerText = currentUserData.publicId;
            document.getElementById('my-avatar').src = currentUserData.photoURL;
            
            loadFriends();
            
            // Online status tracking
            window.addEventListener('beforeunload', () => {
                if(auth.currentUser) {
                    updateDoc(doc(db, "users", auth.currentUser.uid), { isOnline: false, lastSeen: serverTimestamp() });
                }
            });
        }

        // Settings
        document.getElementById('btn-open-settings').addEventListener('click', () => {
            document.getElementById('settings-username').value = currentUserData.username;
            document.getElementById('settings-id').innerText = 'ID: ' + currentUserData.publicId;
            document.getElementById('settings-preview').src = currentUserData.photoURL;
            document.getElementById('modal-settings').classList.replace('hidden', 'flex');
        });

        let settingsFile = null;
        document.getElementById('settings-upload').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                settingsFile = e.target.files[0];
                document.getElementById('settings-preview').src = URL.createObjectURL(settingsFile);
            }
        });

        document.getElementById('btn-save-settings').addEventListener('click', async () => {
            const newUsername = document.getElementById('settings-username').value.trim();
            if(!newUsername) return;
            
            let photoURL = currentUserData.photoURL;
            if(settingsFile) {
                photoURL = await uploadImage(settingsFile, `profiles/${auth.currentUser.uid}`);
            }

            await updateDoc(doc(db, "users", auth.currentUser.uid), {
                username: newUsername,
                photoURL: photoURL
            });

            currentUserData.username = newUsername;
            currentUserData.photoURL = photoURL;
            document.getElementById('my-username').innerText = newUsername;
            document.getElementById('my-avatar').src = photoURL;
            document.getElementById('modal-settings').classList.replace('flex', 'hidden');
        });

        // Add Friend
        document.getElementById('btn-add-friend').addEventListener('click', () => {
            document.getElementById('modal-add-friend').classList.replace('hidden', 'flex');
            document.getElementById('search-result').classList.add('hidden');
            document.getElementById('search-error').classList.add('hidden');
        });

        let foundUser = null;
        document.getElementById('btn-search-friend').addEventListener('click', async () => {
            const queryStr = document.getElementById('input-friend-search').value.trim();
            if(!queryStr) return;

            const usersRef = collection(db, "users");
            let q;
            if (queryStr.startsWith('#')) {
                q = query(usersRef, where("publicId", "==", queryStr));
            } else {
                q = query(usersRef, where("username", "==", queryStr));
            }

            const querySnapshot = await getDocs(q);
            if (!querySnapshot.empty) {
                foundUser = querySnapshot.docs[0].data();
                if(foundUser.uid === auth.currentUser.uid) {
                    document.getElementById('search-error').innerText = "Cannot add yourself.";
                    document.getElementById('search-error').classList.remove('hidden');
                    return;
                }
                document.getElementById('search-result-name').innerText = foundUser.username;
                document.getElementById('search-result-id').innerText = foundUser.publicId;
                document.getElementById('search-result-avatar').src = foundUser.photoURL;
                document.getElementById('search-result').classList.replace('hidden', 'flex');
                document.getElementById('search-error').classList.add('hidden');
            } else {
                document.getElementById('search-result').classList.add('hidden');
                document.getElementById('search-error').innerText = "User not found.";
                document.getElementById('search-error').classList.remove('hidden');
            }
        });

        document.getElementById('btn-add-found-friend').addEventListener('click', async () => {
            if(foundUser) {
                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    friends: arrayUnion(foundUser.uid)
                });
                // Also add me to their friend list for simplicity
                await updateDoc(doc(db, "users", foundUser.uid), {
                    friends: arrayUnion(auth.currentUser.uid)
                });
                document.getElementById('modal-add-friend').classList.replace('flex', 'hidden');
                loadFriends();
            }
        });

        // Load Friends
        function loadFriends() {
            onSnapshot(doc(db, "users", auth.currentUser.uid), async (docSnap) => {
                if(docSnap.exists()) {
                    const data = docSnap.data();
                    const friendsListEl = document.getElementById('friend-list');
                    friendsListEl.innerHTML = '';
                    
                    if(data.friends && data.friends.length > 0) {
                        for(let friendUid of data.friends) {
                            // Listen to friend's profile changes
                            onSnapshot(doc(db, "users", friendUid), (fSnap) => {
                                if(fSnap.exists()) {
                                    renderFriendItem(fSnap.data());
                                    if(currentChatFriend && currentChatFriend.uid === friendUid) {
                                        updateChatHeader(fSnap.data());
                                    }
                                }
                            });
                        }
                    }
                }
            });
        }

        function renderFriendItem(friend) {
            let el = document.getElementById(`friend-${friend.uid}`);
            if(!el) {
                el = document.createElement('div');
                el.id = `friend-${friend.uid}`;
                el.className = "flex items-center gap-3 p-3 border-b hover:bg-gray-50 cursor-pointer transition";
                el.onclick = () => openChat(friend);
                document.getElementById('friend-list').appendChild(el);
            }
            
            el.innerHTML = `
                <div class="relative">
                    <img src="${friend.photoURL}" class="w-12 h-12 rounded-full object-cover">
                    ${friend.isOnline ? '<div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>' : ''}
                </div>
                <div class="flex-1">
                    <div class="flex justify-between">
                        <h4 class="font-semibold text-gray-800">${friend.username}</h4>
                    </div>
                    <p class="text-sm text-gray-500 truncate w-40">${friend.publicId}</p>
                </div>
            `;
        }

        // Chat System
        function getChatId(uid1, uid2) {
            return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
        }

        function updateChatHeader(friend) {
            currentChatFriend = friend;
            document.getElementById('chat-name').innerText = friend.username;
            document.getElementById('chat-avatar').src = friend.photoURL;
            let statusText = "Offline";
            if (friend.isOnline) {
                statusText = "Online";
            } else if (friend.lastSeen) {
                const date = friend.lastSeen.toDate ? friend.lastSeen.toDate() : new Date(friend.lastSeen);
                statusText = `last seen ${date.toLocaleDateString()} at ${formatTime(friend.lastSeen)}`;
            }
            document.getElementById('chat-status').innerText = statusText;
        }

        function openChat(friend) {
            document.getElementById('chat-placeholder').classList.add('hidden');
            document.getElementById('chat-header').classList.remove('hidden');
            document.getElementById('messages-container').classList.remove('hidden');
            document.getElementById('chat-input-area').classList.remove('hidden');
            document.getElementById('chat-input-area').classList.add('flex');

            updateChatHeader(friend);
            currentChatId = getChatId(auth.currentUser.uid, friend.uid);
            
            loadMessages();
        }

        function loadMessages() {
            if(unsubscribeMessages) unsubscribeMessages();
            const messagesContainer = document.getElementById('messages-container');
            messagesContainer.innerHTML = '';

            const q = query(collection(db, `chats/${currentChatId}/messages`), orderBy("timestamp", "asc"));
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    const msg = change.doc.data();
                    const docId = change.doc.id;
                    
                    if (change.type === "added") {
                        const isMe = msg.senderId === auth.currentUser.uid;
                        
                        // Mark as seen if not me
                        if(!isMe && !msg.seen) {
                            updateDoc(doc(db, `chats/${currentChatId}/messages`, docId), { seen: true });
                        }

                        const msgEl = document.createElement('div');
                        msgEl.id = `msg-${docId}`;
                        msgEl.className = `max-w-[70%] rounded-lg p-2 relative shadow-sm ${isMe ? 'bg-[#d9fdd3] self-end rounded-tr-none' : 'bg-white self-start rounded-tl-none'}`;
                        
                        let content = '';
                        if(msg.imageUrl) {
                            content += `<img src="${msg.imageUrl}" class="rounded-lg mb-1 max-w-full cursor-pointer" onclick="window.open('${msg.imageUrl}')">`;
                        }
                        if(msg.text) {
                            content += `<p class="text-gray-800 text-sm">${msg.text}</p>`;
                        }
                        
                        let seenIcon = '';
                        if(isMe) {
                            seenIcon = msg.seen ? '<i class="fa-solid fa-check-double text-blue-500 ml-1"></i>' : '<i class="fa-solid fa-check text-gray-400 ml-1"></i>';
                        }

                        content += `
                            <div class="text-[10px] text-gray-500 text-right mt-1 flex justify-end items-center gap-1">
                                ${formatTime(msg.timestamp)}
                                <span id="status-${docId}">${seenIcon}</span>
                            </div>
                        `;
                        msgEl.innerHTML = content;
                        messagesContainer.appendChild(msgEl);
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    }

                    if (change.type === "modified") {
                        const isMe = msg.senderId === auth.currentUser.uid;
                        if(isMe && msg.seen) {
                            const statusEl = document.getElementById(`status-${docId}`);
                            if(statusEl) statusEl.innerHTML = '<i class="fa-solid fa-check-double text-blue-500 ml-1"></i>';
                        }
                    }
                });
            });
        }

        // Send Message
        async function sendMessage() {
            if(!currentChatId) return;
            const input = document.getElementById('chat-input');
            const fileInput = document.getElementById('chat-image-upload');
            const text = input.value.trim();
            const file = fileInput.files[0];
            
            if(!text && !file) return;

            input.value = '';
            fileInput.value = '';

            let imageUrl = null;
            if(file) {
                imageUrl = await uploadImage(file, `chats/${currentChatId}`);
            }

            await addDoc(collection(db, `chats/${currentChatId}/messages`), {
                senderId: auth.currentUser.uid,
                text: text,
                imageUrl: imageUrl,
                timestamp: serverTimestamp(),
                seen: false
            });
        }

        document.getElementById('btn-send').addEventListener('click', sendMessage);
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });

    </script>
</body>
</html>
